<section class="portal-hero card shadow-sm mb-3">
  <div class="card-body d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
    <div>
      <h2 class="h4 mb-1">{{ module.heading }}</h2>
      <p class="text-muted mb-0">{{ module.subheading }}</p>
    </div>
    {% if module.cta_text and module.cta_url %}
      <a href="{{ module.cta_url|escape_url }}" data-spa-link class="btn btn-primary">{{ module.cta_text }}</a>
    {% endif %}
  </div>
</section>
