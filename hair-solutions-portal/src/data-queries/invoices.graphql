# label: "Portal Invoices"
# description: "Logged-in contact + portal_invoices_json (JSON array of invoice rows mirrored from CRM/workflows). HubL parses JSON in invoice-table.module."
# $contact_id: {{ request.contact.contact_vid || '' }}
query invoices($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
      portal_invoices_json
    }
  }
}
