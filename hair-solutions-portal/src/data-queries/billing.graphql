# label: "Portal Billing"
# description: "Contact core fields. Re-add `portal_billing_json` + HUBDB subscription_plans_collection after props sync and portal:hubdb-sync."
# $contact_id: {{ request.contact.contact_vid || '' }}
query billing($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
