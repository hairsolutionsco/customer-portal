# label: "Portal Shop"
# description: "CRM stub until HubDB `products` table exists — run portal:hubdb-sync then restore HUBDB products_collection block."
# $contact_id: {{ request.contact.contact_vid || '' }}
query products($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
