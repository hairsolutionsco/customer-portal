# label: "Hair Profile"
# description: "Contact core fields. Re-add `portal_hair_profile_json` after `portal:hubspot-props` and GraphQL explorer shows it on crm_contact."
# $contact_id: {{ request.contact.contact_vid || '' }}
query hair_profile($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
