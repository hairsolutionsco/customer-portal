# label: "Portal Orders List"
# description: "All orders for logged-in customer (stub until order custom object exists)"
# $contact_id: {{ request.contact.contact_vid || '' }}
query orders_list($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
