# label: "Customization Templates"
# description: "Contact core fields. Re-add `portal_saved_templates_json` once property exists in CMS GraphQL schema."
# $contact_id: {{ request.contact.contact_vid || '' }}
query customization_templates($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
