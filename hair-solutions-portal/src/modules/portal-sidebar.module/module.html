<aside id="portal-sidebar" class="portal-sidebar" data-portal-sidebar aria-label="Portal navigation">
  <div class="portal-sidebar__brand">
    {% if theme.portal.logo.src %}
    <img src="{{ theme.portal.logo.src }}" alt="Hair Solutions" class="portal-sidebar__logo">
    {% else %}
    <span class="portal-sidebar__title">Hair Solutions</span>
    {% endif %}
  </div>
  <nav class="portal-sidebar__nav" aria-label="Primary">
    <a class="portal-sidebar__link" data-nav-link href="/portal">Dashboard</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/orders">Orders</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/profile">Hair profile</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/customization">Customization</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/shop">Shop</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/billing">Billing</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/invoices">Invoices</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/locations">Locations</a>
    <a class="portal-sidebar__link" data-nav-link href="{{ module.support_url }}">Support</a>
    <a class="portal-sidebar__link" data-nav-link href="{{ module.help_url }}">Help center</a>
    <a class="portal-sidebar__link" data-nav-link href="/portal/settings">Settings</a>
  </nav>
  <div class="portal-sidebar__footer">
    <a class="portal-sidebar__link portal-sidebar__link--muted" href="{{ member_logout_url }}">Log out</a>
  </div>
</aside>
