# label: "Portal Billing"
# description: "Current plan + plan catalog (stub until contact props + HubDB subscription_plans exist)"
# $contact_id: {{ request.contact.contact_vid || '' }}
# Restore full query from AGENT_PROMPT after #11 + #12; validate in GraphQL explorer.
query billing($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
