# label: "Hair Profile"
# description: "Hair profile for logged-in customer (stub until hair_profile custom object + association names exist)"
# $contact_id: {{ request.contact.contact_vid || '' }}
query hair_profile($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
    }
  }
}
