<!--
  templateType: "none"
  isAvailableForNewContent: false
-->
<header class="hs-site-header" role="banner">
  <div class="hs-site-header__inner hs-cluster" style="padding:1rem 1.5rem;justify-content:space-between;max-width:1200px;margin:0 auto;">
    <a href="/" class="hs-site-header__brand hs-cluster" style="gap:0.75rem;align-items:center;">
      {% if theme.portal.logo.src %}
      <img src="{{ theme.portal.logo.src }}" alt="Hair Solutions" width="{{ theme.portal.logo.width }}" height="{{ theme.portal.logo.height }}" style="max-height:40px;width:auto;">
      {% endif %}
      <span style="font-weight:600;">Hair Solutions</span>
    </a>
  </div>
</header>
