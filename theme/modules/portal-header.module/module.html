<header class="portal-header-bar{% if module.admin_header %} portal-header-bar--admin{% endif %}" role="banner">
  <div class="portal-header-bar__inner">
    <button type="button" class="portal-header-bar__menu" data-sidebar-toggle aria-expanded="false" aria-controls="portal-sidebar">
      <span class="hs-sr-only" data-sidebar-toggle-label>Open navigation menu</span>
      <span aria-hidden="true">☰</span>
    </button>
    <div class="portal-header-bar__titles">
      {% if module.page_title %}
      <h1 class="portal-header-bar__page-title">{{ module.page_title }}</h1>
      {% endif %}
      <p class="portal-header-bar__greeting">
        Hello{% if request.contact.firstname %}, {{ request.contact.firstname }}{% endif %}
        {% if module.admin_header %}
        <span class="portal-header-bar__context-tag" aria-hidden="true">· Admin</span>
        {% endif %}
      </p>
    </div>
    <nav class="portal-header-bar__actions" aria-label="Account">
      {% if module.admin_header %}
      <a class="portal-header-bar__link" href="/portal">Customer portal</a>
      {% endif %}
      <a class="portal-header-bar__logout" href="{{ member_logout_url }}">Log out</a>
    </nav>
  </div>
</header>
