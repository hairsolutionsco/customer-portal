{#
  Optional: prev_url, next_url, page_label (e.g. "Page 2 of 5")
#}
{% if prev_url or next_url or page_label %}
<nav class="portal-pagination" aria-label="Pagination">
  <div class="portal-pagination__inner">
    {% if prev_url %}
    <a class="portal-pagination__link portal-pagination__prev" href="{{ prev_url }}">Previous</a>
    {% else %}
    <span class="portal-pagination__link portal-pagination__prev portal-pagination__link--disabled" aria-disabled="true">Previous</span>
    {% endif %}
    {% if page_label %}
    <span class="portal-pagination__status">{{ page_label }}</span>
    {% endif %}
    {% if next_url %}
    <a class="portal-pagination__link portal-pagination__next" href="{{ next_url }}">Next</a>
    {% else %}
    <span class="portal-pagination__link portal-pagination__next portal-pagination__link--disabled" aria-disabled="true">Next</span>
    {% endif %}
  </div>
</nav>
{% endif %}
