# label: "Portal Billing"
# description: "Contact subscription fields + HubL HubDB plans via theme.hubdb.subscription_plans_table_id. JSON snapshot optional."
# $contact_id: {{ request.contact.contact_vid || '' }}
query billing($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
      current_plan
      plan_price
      billing_interval
      period_start
      period_end
      plan_status
    }
  }
}
