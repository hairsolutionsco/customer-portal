# label: "Portal Settings"
# description: "Profile + notification_preferences (#11). Validated upload 50966981 2026-04-10."
# $contact_id: {{ request.contact.contact_vid || '' }}
query settings($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
      phone
      address
      city
      state
      zip
      notify_order_updates
      notify_production_reminders
      notify_marketing
    }
  }
}
