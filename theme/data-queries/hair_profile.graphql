# label: "Hair Profile"
# description: "Contact + portal_hair_profile_json. Validated hs cms upload draft 50966981 2026-04-10."
# $contact_id: {{ request.contact.contact_vid || '' }}
query hair_profile($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      firstname
      lastname
      email
      portal_hair_profile_json
    }
  }
}
