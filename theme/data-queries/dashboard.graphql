# label: "Portal Dashboard"
# description: "Contact + deals-as-orders + portal_hair_profile_json. portal_billing_json not on crm_contact GraphQL here — omitted."
# $contact_id: {{ request.contact.contact_vid || '' }}
# Deal association: p_order_collection__primary aliases deal_collection__contact_to_deal — see SCHEMA_REGISTRY.md
query dashboard($contact_id: String!) {
  CRM {
    contact(uniqueIdentifier: "id", uniqueIdentifierValue: $contact_id) {
      _metadata {
        id
      }
      firstname
      lastname
      email
      portal_hair_profile_json
      associations {
        p_order_collection__primary: deal_collection__contact_to_deal {
          items {
            hs_object_id
            order_number: hs_object_id
            product_name: dealname
            status: dealstage
            production_stage: dealstage
            total: amount
            currency: deal_currency_code
            hs_createdate: createdate
            estimated_completion: closedate
          }
          total
        }
      }
    }
  }
}
